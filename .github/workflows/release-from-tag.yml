name: Release from Tag

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Release from Tag
        uses: wcm-io-devops/github-action-release-from-tag@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
